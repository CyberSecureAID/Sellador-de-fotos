<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5CFFB0"/>
      <stop offset="1" stop-color="#1FD98A"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="#0A0F0C"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="13.5" fill="none"
        stroke="url(#g)" stroke-opacity=".35" stroke-width="1.5"/>
  <g filter="url(#glow)">
    <!-- marco de foto (esquinas tipo visor de cámara) -->
    <path d="M18 22 v-4 h4 M42 18 h4 v4 M46 42 v4 h-4 M22 46 h-4 v-4"
          fill="none" stroke="url(#g)" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- montaña (marca de sello) -->
    <path d="M20 40 l7-10 5 6 4-7 8 11 z" fill="url(#g)"/>
    <!-- sol/punto -->
    <circle cx="40" cy="24" r="3.2" fill="url(#g)"/>
  </g>
</svg>
